spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    dynamic:
      primary: primary
      strict: false
      datasource:
        primary:
          driver-class-name: dm.jdbc.driver.DmDriver
          url: jdbc:dm://118.193.126.254:5236/INTELLIGENT_OFFICE?schema=INTELLIGENT_OFFICE&encoding=UTF-8
          username: SYSDBA
          password: Sysdba@123
  data:
    redis:
      host: 101.52.216.178
      port: 6379
      database: 0
      timeout: 1800s # 使用时间格式化
      password: yyccYOUyun
      lettuce:
        pool:
          max-active: 20  # 最大连接数
          max-wait: -1    # 最大阻塞等待时间(负数表示没限制)
          max-idle: 5     # 最大空闲
          min-idle: 0     # 最小空闲
  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 60s

  main:
    allow-bean-definition-overriding: true
    jackson:
      date-format: yyyy/MM/dd HH:mm:ss
      time-zone: GMT+8





# 登录token拦截
platform:
  interceptor:
    configs:
      exclude-login-urls: # 非不需要登录接口
        - /api/v1/chat/login
        - /api/v1/chat/login/captcha
        - /api/v1/chat/login/verifyIdentityFromTfoa
        - /api/v1/chat/login/
        - /api/v1/chat/login/verifyFromTfoaMobile
        - /swagger-ui/*
        - /swagger-ui.html
        - /v3/api-docs/**
        - /webjars/**
        - /doc.html
#        - /api/v1/chat/*
#        - /api/v1/resource/*
#        - /api/v1/historyChat/*

      exclude-statistic-urls: # 不需要统计接口
        - /static/**
        - /icon/**
        - /css/**

  # 请求认证接口配置
  auth:
    configs:
      enable: true
      verify-url: https://kmoa.test.oa.cnki.net/api/auth/api/v1/authentication?token=   # token 验证接口

