platform:
  interceptor:
    configs:
      exclude-login-urls: # 非不需要登录接口
        - /api/v1/op/login
        - /api/v1/op/login/captcha
        - /api/v1/op/login/verifyFromTfoa
        - /api/v1/op/login/verifyFromTfoaPc
        - /api/v1/op/login/verifyFromTfoaMobile
        - /api/v1/op/login/getWeaverToken
        - /swagger-ui/*
        - /swagger-ui.html
        - /v3/api-docs/**
        - /webjars/**
